name: Frontend CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  build_and_push_docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shorten-url-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/shorten-url-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VUE_APP_API_URL=${{ secrets.VUE_APP_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push_docker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Trigger Vercel Deploy
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Write Deployment Summary
        run: |
          echo "### Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Docker: ${{ secrets.DOCKER_USERNAME }}/shorten-url-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Vercel: production" >> $GITHUB_STEP_SUMMARY
