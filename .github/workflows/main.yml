name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VUE_APP_API_URL: ${{ secrets.VUE_APP_API_URL }}

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${RENDER_DEPLOY_HOOK_URL}")
          if [ "$RESPONSE" != "200" ]; then
            echo "Deploy thất bại HTTP $RESPONSE"
            exit 1
          fi
          echo "Deploy thành công (HTTP $RESPONSE)"
